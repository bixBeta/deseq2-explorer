# ── Phase 1: Single container (default) ───────────────────────────────────────
# docker compose up

# ── Phase 2: Split containers — uncomment the multi-service block below ────────

version: "3.9"

services:
  app:
    build: .
    ports:
      - "80:80"
    volumes:
      - deseq2_data:/data
    env_file:
      - .env
    restart: unless-stopped

volumes:
  deseq2_data:

