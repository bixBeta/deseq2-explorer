name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:       # allow manual trigger from GitHub Actions UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write      # needed to push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/deseq2-explorer
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/deseq2-explorer
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build and push image to GHCR + Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Registry cache persists indefinitely in GHCR with no size cap.
          # R package layers (installed before any COPY of app code) are reused
          # on every push that doesn't touch the package list — no reinstall needed.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/deseq2-explorer:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/deseq2-explorer:buildcache,mode=max
          platforms: linux/amd64   # arm64 via QEMU is unreliable for heavy R packages
          build-args: |
            NOTIFY_URL=${{ secrets.NOTIFY_URL }}
            NOTIFY_TOKEN=${{ secrets.NOTIFY_TOKEN }}
